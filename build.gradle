 */
plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

// Đổi từ 11 sang 21
sourceCompatibility = 21
targetCompatibility = 21

group = 'pluginsmc.langdua'
version = 'rl_1.0'


repositories {
    mavenCentral()
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
    maven { url = 'https://repo.aikar.co/content/groups/aikar/' }
}

dependencies {
    // Nâng cấp API lên bản 1.21.x
    compileOnly 'io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT'

    // Các thư viện cần thiết của plugin
    implementation 'co.aikar:acf-paper:0.5.1-SNAPSHOT'
    implementation 'co.aikar:taskchain-bukkit:3.7.2'

    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
}

processResources {
    from(sourceSets.main.resources.srcDirs) {
        // Expand the version placeholder in plugin.yml but leave other resources unchanged.
        expand 'version': project.version
        include 'plugin.yml', 'config.yml'
    }
    // Include any other files in src/main/resources (such as config.yml) without filtering
    from(sourceSets.main.resources.srcDirs) {
        exclude 'plugin.yml'
        exclude 'config.yml'
    }
    duplicatesStrategy = DuplicatesStrategy.INCLUDE // Thêm dòng này
}

shadowJar {
    relocate 'co.aikar.commands', 'shadded.acf'
    relocate 'co.aikar.locales', 'shadded.acf.locales'
    relocate 'acf-minecraft_', 'shadded.acf.properties.acf-minecraft_'
    relocate 'acf-core_', 'shadded.acf.properties.acf-core_'
    relocate 'us.jcedeno.libs.rapidinv', 'com.yourpackage.rapidinv'

}
def targetJavaVersion = 21
java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    sourceCompatibility = javaVersion
    targetCompatibility = javaVersion
    toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

build.dependsOn shadowJar
