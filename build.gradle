 *
 * This is a general purpose Gradle build.
 * Learn how to create Gradle builds at https://guides.gradle.org/creating-new-gradle-builds
 */
plugins {
    id 'eclipse'
    id 'java'
    // Đổi ID từ com.github.johnrengelman.shadow sang bản mới của cộng đồng
    id 'io.github.goooler.shadow' version '8.1.8'
}

// Đổi từ 11 sang 21
sourceCompatibility = 21
targetCompatibility = 21

group = 'net.aleiv'
version = '0.1-SNAPSHOT'


repositories {
    mavenCentral()
    jcenter()
    maven { url 'https://papermc.io/repo/repository/maven-public/' }
    maven { url 'https://libraries.minecraft.net/' }
    maven { url 'https://plugins.gradle.org/m2' }
    maven { url 'https://jitpack.io' }
    maven { url 'https://repo.aikar.co/content/groups/aikar/' }
}


dependencies {
    //Paper
    compileOnly 'io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT'
    //Lombok
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'
    //ACF
    implementation 'co.aikar:acf-paper:0.5.0-SNAPSHOT'
    //TASKS CHAINS
    implementation 'co.aikar:taskchain-bukkit:3.7.2'
}

processResources {
    from(sourceSets.main.resources.srcDirs) {
        // Expand the version placeholder in plugin.yml but leave other resources unchanged.
        expand 'version': project.version
        include 'plugin.yml', 'config.yml'
    }
    // Include any other files in src/main/resources (such as config.yml) without filtering
    from(sourceSets.main.resources.srcDirs) {
        exclude 'plugin.yml'
        exclude 'config.yml'
    }
    duplicatesStrategy = DuplicatesStrategy.INCLUDE // Thêm dòng này
}

shadowJar {
    relocate 'co.aikar.commands', 'shadded.acf'
    relocate 'co.aikar.locales', 'shadded.acf.locales'
    relocate 'acf-minecraft_', 'shadded.acf.properties.acf-minecraft_'
    relocate 'acf-core_', 'shadded.acf.properties.acf-core_'
    relocate 'us.jcedeno.libs.rapidinv', 'com.yourpackage.rapidinv'

}


build.dependsOn shadowJar
